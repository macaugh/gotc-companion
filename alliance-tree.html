<style>
  .page { max-width: 1100px; }

  /* Tab strip */
  .ac-tabs { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .ac-tab {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 7px 18px;
    border: 1px solid var(--border-strong);
    border-radius: 3px;
    background: var(--bg-card);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .ac-tab:hover { color: var(--gold); border-color: var(--gold-dark); }
  .ac-tab.active { background: var(--blood); color: var(--gold-pale); border-color: #8b1818; }

  /* Controls bar */
  .controls {
    display: flex; gap: 10px; align-items: center;
    margin-bottom: 1.25rem; flex-wrap: wrap;
  }
  .search-box {
    flex: 1; min-width: 180px; max-width: 280px;
    background: var(--bg-card); border: 1px solid var(--border-strong);
    color: var(--text); font-family: 'Cormorant Garamond', serif;
    font-size: 15px; padding: 6px 12px; border-radius: 3px;
  }
  .search-box::placeholder { color: var(--text-muted); }
  .search-box:focus { outline: none; border-color: var(--gold-dark); }
  .ctrl-btn {
    font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 6px 14px;
    border: 1px solid var(--border-strong); border-radius: 3px;
    background: var(--bg-card); color: var(--text-muted);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .ctrl-btn:hover { color: var(--gold); border-color: var(--gold-dark); }
  .tier-filter {
    display: flex; gap: 5px; flex-wrap: wrap;
  }
  .tier-btn {
    font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.08em;
    padding: 5px 11px; border-radius: 3px; cursor: pointer;
    border: 1px solid transparent; transition: all 0.15s; color: #fff;
  }
  .tier-btn[data-tier="1"] { background: #6b1818; border-color: #8b1818; }
  .tier-btn[data-tier="2"] { background: #3a1a00; border-color: #6b4f1d; }
  .tier-btn[data-tier="3"] { background: #0d2a12; border-color: #1a5e3a; }
  .tier-btn[data-tier="4"] { background: #1a1a2a; border-color: #2a2a5a; }
  .tier-btn.dimmed { opacity: 0.35; }

  /* Stats row */
  .stats-row {
    display: flex; gap: 12px; margin-bottom: 1.25rem; flex-wrap: wrap;
  }
  .stat-pill {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 14px;
    font-size: 13px; color: var(--text-muted);
  }
  .stat-pill strong { color: var(--gold); font-weight: 600; }

  /* Tree */
  .tree { list-style: none; padding: 0; margin: 0; }
  .tree ul { list-style: none; padding-left: 24px; margin: 0; position: relative; }
  .tree ul::before {
    content: '';
    position: absolute; left: 10px; top: 0; bottom: 8px;
    border-left: 1px solid var(--border-strong);
  }
  .tree li { position: relative; }
  .tree li + li { margin-top: 4px; }
  .tree ul > li::before {
    content: '';
    position: absolute; left: -14px; top: 18px;
    width: 14px; border-top: 1px solid var(--border-strong);
  }

  /* Member card */
  .member-card {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 12px; border-radius: 4px;
    border: 1px solid transparent;
    cursor: pointer; transition: background 0.12s, border-color 0.12s;
    user-select: none;
  }
  .member-card:hover { border-color: var(--border-strong); background: var(--bg-card-raised); }
  .member-card.has-children::before {
    content: '▶';
    font-size: 9px; color: var(--text-muted);
    transition: transform 0.15s; display: inline-block;
    min-width: 14px;
  }
  .member-card.has-children.open::before { transform: rotate(90deg); }
  .member-card.no-children::before { content: ''; min-width: 14px; }

  /* Tier badge */
  .tier-badge {
    font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.1em;
    padding: 2px 8px; border-radius: 2px; white-space: nowrap; font-weight: 600;
  }
  .tb-1 { background: #6b1818; color: #f5d9d9; border: 1px solid #8b1818; }
  .tb-2 { background: #3a1a00; color: var(--gold-pale); border: 1px solid var(--gold-dark); }
  .tb-3 { background: #0d2a12; color: #a8d4b0; border: 1px solid #1a5e3a; }
  .tb-4 { background: #1a1a2a; color: #a0a8d4; border: 1px solid #2a2a5a; }

  .member-name {
    font-size: 15px; color: var(--text); flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .member-name.highlight { color: var(--gold-bright); font-weight: 600; }
  .member-level { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
  .member-followers { font-size: 12px; color: var(--gold-faint); white-space: nowrap; }
  .off-map { font-size: 11px; color: #8b6818; margin-left: 2px; }

  /* Hidden tier */
  .tier-hidden { display: none !important; }

  /* Proposed badge */
  .proposed-badge {
    font-size: 10px; font-family: 'Cinzel', serif; letter-spacing: 0.05em;
    padding: 2px 7px; border-radius: 2px;
    background: #1a1a00; color: var(--gold-dim); border: 1px dashed var(--gold-dark);
    white-space: nowrap;
  }

  /* Collapsed children */
  .children { display: none; }
  .children.open { display: block; }

  /* Search highlight */
  .search-dim .member-name:not(.highlight) { opacity: 0.3; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }

  .note-box {
    background: var(--bg-card); border: 1px solid var(--border-strong);
    border-radius: 4px; padding: 10px 14px;
    font-size: 13px; color: var(--text-muted); margin-bottom: 1.25rem;
    font-style: italic;
  }
  .note-box strong { color: var(--gold-dim); font-style: normal; }

  /* Combined interactive editor */
  .comb-btns { display: flex; gap: 3px; margin-left: auto; padding-left: 8px; flex-shrink: 0; }
  .comb-btn {
    font-size: 10px; padding: 1px 7px; border-radius: 2px; line-height: 1.7;
    border: 1px solid var(--border-strong); background: var(--bg-card);
    color: var(--text-muted); cursor: pointer;
    font-family: 'Cinzel', serif; letter-spacing: 0.04em;
    white-space: nowrap; transition: all 0.12s;
  }
  .comb-btn:hover { color: var(--gold); border-color: var(--gold-dark); }
  .comb-btn.promote { color: #a8d4b0; border-color: #1a5e3a; }
  .comb-btn.promote:hover { background: #0d2a12; }
  .comb-btn.demote { color: #a0a8d4; border-color: #2a2a5a; }
  .comb-btn.demote:hover { background: #0d0d2a; }
  .comb-btn.pick { color: var(--gold-pale); border-color: var(--gold-dark); }
  .comb-btn.pick:hover { background: #1a1200; }
  .comb-btn.cancel { color: #d48080; border-color: #5a1a1a; }
  .comb-btn.cancel:hover { background: #2a0d0d; }
  .comb-btn.place { background: #0d2a12; color: #a8d4b0; border-color: #1a5e3a; }
  .comb-btn.place:hover { background: #1a3a1a; }
  .member-card.comb-moving { outline: 2px solid var(--gold); background: #1a1500 !important; }
  .member-card.comb-can-target { border-color: #1a5e3a !important; }
  .member-card.comb-disabled { opacity: 0.28; pointer-events: none; }
  .move-banner {
    background: #1a1500; border: 1px solid var(--gold-dark); border-radius: 4px;
    padding: 8px 14px; margin-bottom: 12px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    font-size: 13px; color: var(--gold-pale);
  }
  .move-banner strong { color: var(--gold); }
  .move-banner button {
    font-family: 'Cinzel', serif; font-size: 11px; padding: 3px 10px;
    background: var(--bg-card); border: 1px solid #5a1a1a;
    color: #d48080; cursor: pointer; border-radius: 2px; letter-spacing: 0.06em;
  }
  .comb-reset {
    font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.08em;
    padding: 5px 14px; border-radius: 3px; cursor: pointer;
    border: 1px solid var(--border-strong); background: var(--bg-card);
    color: var(--text-muted); transition: all 0.15s; margin-bottom: 12px;
  }
  .comb-reset:hover { color: var(--gold); border-color: var(--gold-dark); }
</style>

// Height → tier label (h=4 is root/T1)
function tierLabel(h) { return ['','T4','T3','T2','T1'][h] || 'T?'; }
function tierClass(h) { return 'tb-' + (5-h); }  // h4→tb-1, h3→tb-2, h2→tb-3, h1→tb-4
function tierNum(h) { return 5 - h; }              // h4→1, h3→2, h2→3, h1→4

// Build parent→children map from flat roster
function buildTree(roster) {
  const byId = {};
  roster.forEach(m => { byId[m.id] = m; m.children = []; });
  roster.forEach(m => {
    if (m.liege_id && byId[m.liege_id]) {
      byId[m.liege_id].children.push(m);
    }
  });
  // Sort children by height desc (higher tier first), then level desc
  roster.forEach(m => {
    m.children.sort((a,b) => b.height - a.height || (b.level||0) - (a.level||0));
  });
  return roster.filter(m => !m.liege_id || !byId[m.liege_id]);
}

// Render a single member node
// tNum: explicit tier number (1–4) from position in tree; overrides height-derived value
function renderMember(m, isProposed=false, tNum=null) {
  if (tNum === null) tNum = isProposed ? 4 : tierNum(m.height);
  const hasKids = isProposed
    ? ((m.t2s||[]).length + (m.t3s||[]).length + (m.t4s||[]).length) > 0
    : (m.children && m.children.length > 0);
  const followers = m.followers || 0;
  const lvl = m.level != null ? 'K' + m.level : '';
  const offMap = !m.on_map ? '<span class="off-map" title="Not found in map sweep">⚠</span>' : '';
  const wing = m.wing ? ` <span class="proposed-badge">${m.wing}</span>` : '';

  const cardClass = ['member-card', hasKids ? 'has-children' : 'no-children'].join(' ');
  return `
    <div class="${cardClass}" data-tier="${tNum}" onclick="toggleNode(this)">
      <span class="tier-badge tb-${tNum}">T${tNum}</span>
      <span class="member-name">${m.name}</span>${offMap}${wing}
      ${lvl ? `<span class="member-level">${lvl}</span>` : ''}
      ${followers > 0 ? `<span class="member-followers">${followers} bannermen</span>` : ''}
    </div>`;
}

// Render flat roster as a hierarchy — tier label comes from depth, not height
function renderTreeNodes(roots) {
  function renderNode(m, depth) {
    const tNum = depth + 1;  // root=T1, child-of-root=T2, etc.
    const card = renderMember(m, false, tNum);
    const kids = m.children || [];
    if (!kids.length) return `<li>${card}</li>`;
    const childHtml = kids.map(kid => renderNode(kid, depth + 1)).join('');
    return `<li>${card}<ul class="children">${childHtml}</ul></li>`;
  }
  return `<ul class="tree">${roots.map(m => renderNode(m, 0)).join('')}</ul>`;
}

// Render proposed combined tree
function renderCombined(node) {
  const t2s = node.t2s || [];
  const card = renderMember(node, true, node.proposedTier || 1);
  if (!t2s.length) return `<li>${card}</li>`;

  function makeT4Group(t4s) {
    return `<li>
      <div class="member-card has-children" data-tier="4" onclick="toggleNode(this)">
        <span class="tier-badge tb-4">T4</span>
        <span class="member-name">${t4s.length} members</span>
      </div>
      <ul class="children">
        ${t4s.map(t4 => `<li>${renderMember(t4, true, 4)}</li>`).join('')}
      </ul></li>`;
  }

  let html = `<li>${card}<ul class="children open">`;
  html += t2s.map(t2 => {
    const hasThreed = (t2.t3s||[]).length > 0;
    const hasFoured = (t2.t4s||[]).length > 0;
    const hasSubKids = hasThreed || hasFoured;

    // T3 list: T4 group is nested inside the last T3 (one-tier rule)
    let t3Html = '';
    if (hasThreed) {
      t3Html = t2.t3s.map((t3, i) => {
        const isLast = i === t2.t3s.length - 1;
        if (isLast && hasFoured) {
          const t3Card = renderMember(t3, true, 3).replace('no-children', 'has-children');
          return `<li>${t3Card}<ul class="children open">${makeT4Group(t2.t4s)}</ul></li>`;
        }
        return `<li>${renderMember(t3, true, 3)}</li>`;
      }).join('');
    }

    // No T3s: show placeholder instead of dumping T4s directly under T2
    let placeholderHtml = '';
    if (!hasThreed && hasFoured) {
      placeholderHtml = `<li>
        <div class="member-card no-children" data-tier="3" style="opacity:0.55;font-style:italic">
          <span class="tier-badge tb-3">T3</span>
          <span class="member-name">5 open slots — ${t2.t4s.length} T4s pending T3 assignment</span>
        </div>
      </li>`;
    }

    const t2Card = renderMember(t2, true, 2);
    if (!hasSubKids) return `<li>${t2Card}</li>`;
    return `<li>${t2Card.replace('no-children', 'has-children')}<ul class="children open">${t3Html}${placeholderHtml}</ul></li>`;
  }).join('');
  html += '</ul></li>';
  return html;
}

// ─── Combined interactive state ──────────────────────────────────────────────
let combNodes = {};   // id → {id, name, level, parentId, alliance}
let combMoveSource = null;

function initCombinedState() {
  combNodes = {};
  combMoveSource = null;
  // Build real-roster map for T4→T3 liege lookup
  const byId = {};
  [...RAW.r3vrs, ...RAW.kboom].forEach(p => { byId[p.id] = p; });

  const c = RAW.combined;
  combNodes[c.id] = { id: c.id, name: c.name, level: c.level, parentId: null, alliance: 'SHARED' };

  const t3Set = new Set();
  (c.t2s || []).forEach(t2 => {
    const wing = t2.wing || 'SHARED';
    combNodes[t2.id] = { id: t2.id, name: t2.name, level: t2.level, parentId: c.id, alliance: wing };
    (t2.t3s || []).forEach(t3 => {
      combNodes[t3.id] = { id: t3.id, name: t3.name, level: t3.level, parentId: t2.id, alliance: wing };
      t3Set.add(t3.id);
    });
    (t2.t4s || []).forEach(t4 => {
      // Place T4 under its real T3 liege if that T3 is in the combined structure
      const realLiege = byId[t4.id]?.liege_id;
      const pid = (realLiege && t3Set.has(realLiege)) ? realLiege : t2.id;
      combNodes[t4.id] = { id: t4.id, name: t4.name, level: t4.level, parentId: pid, alliance: wing };
    });
  });
}

function combKids(id) {
  return Object.values(combNodes)
    .filter(n => n.parentId === id)
    .sort((a, b) => (b.level || 0) - (a.level || 0));
}

function combDepth(id) {
  let d = 0, cur = id;
  while (combNodes[cur]?.parentId) { cur = combNodes[cur].parentId; if (++d > 5) break; }
  return d;
}

function combDesc(id) {
  const out = new Set();
  const q = combKids(id).map(c => c.id);
  while (q.length) {
    const cur = q.shift();
    out.add(cur);
    combKids(cur).forEach(c => q.push(c.id));
  }
  return out;
}

function combStartMove(id, e) {
  e.stopPropagation();
  combMoveSource = (combMoveSource === id) ? null : id;
  renderView();
}

function combCancelMove() { combMoveSource = null; renderView(); }

function combPlaceUnder(targetId, e) {
  e.stopPropagation();
  if (!combMoveSource) return;
  combNodes[combMoveSource].parentId = targetId;
  combMoveSource = null;
  renderView();
}

function combPromote(id, e) {
  e.stopPropagation();
  const n = combNodes[id];
  if (!n?.parentId) return;
  const gp = combNodes[n.parentId]?.parentId;
  if (gp === undefined || gp === null) return;  // already T2 — don't co-root
  n.parentId = gp;
  renderView();
}

function combDemote(id, e) {
  e.stopPropagation();
  const n = combNodes[id];
  if (!n?.parentId) return;
  // Move under the first eligible sibling (not itself, not too deep)
  const siblings = combKids(n.parentId).filter(s => s.id !== id && combDepth(s.id) < 3);
  if (!siblings.length) return;
  // Prefer the sibling with the most existing children
  siblings.sort((a, b) => combKids(b.id).length - combKids(a.id).length);
  n.parentId = siblings[0].id;
  renderView();
}

function renderCombinedInteractive() {
  const root = Object.values(combNodes).find(n => !n.parentId);
  if (!root) return '<p>No data.</p>';

  const inMove = combMoveSource !== null;
  const desc = inMove ? combDesc(combMoveSource) : null;

  function validTarget(id) {
    if (!inMove || id === combMoveSource) return false;
    if (desc?.has(id)) return false;
    return combDepth(id) < 3;  // T1/T2/T3 can accept children; T4 (depth 3) cannot
  }

  function renderNode(n, depth) {
    const tier = depth + 1;
    const kids = combKids(n.id);
    const isSource = inMove && n.id === combMoveSource;
    const isTarget = validTarget(n.id);
    const isGray   = inMove && !isSource && !isTarget;

    const aB = (n.alliance && n.alliance !== 'SHARED')
      ? `<span class="proposed-badge">${n.alliance}</span>` : '';
    const lvl = n.level ? `<span class="member-level">K${n.level}</span>` : '';

    let btns = '';
    if (inMove) {
      if (isSource) btns = `<button class="comb-btn cancel" onclick="combCancelMove()">✕</button>`;
      else if (isTarget) btns = `<button class="comb-btn place" onclick="combPlaceUnder('${n.id}',event)">← Here</button>`;
    } else if (depth > 0) {
      const canPromote = depth >= 2;
      const hasSib = combKids(combNodes[n.id].parentId)
        .some(s => s.id !== n.id && combDepth(s.id) < 3);
      if (canPromote) btns += `<button class="comb-btn promote" onclick="combPromote('${n.id}',event)" title="Move up one tier">↑ Up</button>`;
      if (hasSib)    btns += `<button class="comb-btn demote"  onclick="combDemote('${n.id}',event)"  title="Move down under a sibling">↓ Down</button>`;
      btns += `<button class="comb-btn pick" onclick="combStartMove('${n.id}',event)" title="Move anywhere">⇅ Move</button>`;
    }

    const cls = [
      'member-card', kids.length ? 'has-children' : 'no-children',
      isSource ? 'comb-moving'     : '',
      isTarget ? 'comb-can-target' : '',
      isGray   ? 'comb-disabled'   : '',
    ].filter(Boolean).join(' ');

    const clk = (!inMove || isSource) ? 'onclick="toggleNode(this)"' : '';
    const card = `<div class="${cls}" data-tier="${tier}" ${clk}>
      <span class="tier-badge tb-${tier}">T${tier}</span>
      <span class="member-name">${n.name}</span>${aB}${lvl}
      ${btns ? `<span class="comb-btns" onclick="event.stopPropagation()">${btns}</span>` : ''}
    </div>`;

    if (!kids.length) return `<li>${card}</li>`;
    return `<li>${card}<ul class="children open">${kids.map(k => renderNode(k, depth + 1)).join('')}</ul></li>`;
  }

  const banner = inMove
    ? `<div class="move-banner">Moving <strong>${combNodes[combMoveSource]?.name}</strong>
         — click <strong>← Here</strong> on the desired new parent
         <button onclick="combCancelMove()">✕ Cancel</button></div>`
    : '';

  return banner + `<ul class="tree">${renderNode(root, 0)}</ul>`;
}

// Toggle expand/collapse
function toggleNode(card) {
  const children = card.nextElementSibling;
  if (!children || !children.classList.contains('children')) return;
  card.classList.toggle('open');
  children.classList.toggle('open');
}

// Current state
let currentView = 'r3vrs';
let hiddenTiers = new Set();
let searchQuery = '';

function renderView() {
  const container = document.getElementById('view-container');
  const statsRow = document.getElementById('stats-row');

  if (currentView === 'r3vrs') {
    const roster = RAW.r3vrs;
    const roots = buildTree(roster);
    container.innerHTML = renderTreeNodes(roots);
    statsRow.innerHTML = statPills([
      ['Members', roster.length],
      ['T2 Bannermen', roster.filter(m=>m.height===3).length],
      ['T3 Officers', roster.filter(m=>m.height===2).length],
      ['T4 Members', roster.filter(m=>m.height===1).length],
      ['Off-map', roster.filter(m=>!m.on_map).length],
    ]);
  } else if (currentView === 'kboom') {
    const roster = RAW.kboom;
    const roots = buildTree(roster);
    container.innerHTML = renderTreeNodes(roots);
    statsRow.innerHTML = statPills([
      ['Members', roster.length],
      ['T2 Bannermen', roster.filter(m=>m.height===3).length],
      ['T3 Officers', roster.filter(m=>m.height===2).length],
      ['T4 Members', roster.filter(m=>m.height===1).length],
    ]);
  } else {
    container.innerHTML =
      `<button class="comb-reset" onclick="initCombinedState();renderView()">↺ Reset to default</button>` +
      renderCombinedInteractive();
    const r3n  = Object.values(combNodes).filter(n => n.alliance === 'R3VRS').length;
    const kbn  = Object.values(combNodes).filter(n => n.alliance === 'KB00M').length;
    const root = Object.values(combNodes).find(n => !n.parentId);
    statsRow.innerHTML = statPills([
      ['Total', Object.keys(combNodes).length],
      ['R3VRS', r3n],
      ['KB00M', kbn],
      ['T2 Wings', root ? combKids(root.id).length : 0],
    ]);
  }
  applyFilters();
}

function statPills(pairs) {
  return pairs.map(([label, val]) =>
    `<div class="stat-pill">${label}: <strong>${val}</strong></div>`
  ).join('');
}

function applyFilters() {
  const container = document.getElementById('view-container');
  const q = searchQuery.toLowerCase().trim();

  // Tier visibility
  container.querySelectorAll('[data-tier]').forEach(el => {
    const t = +el.dataset.tier;
    const card = el.classList.contains('member-card') ? el : null;
    if (card) {
      card.closest('li').classList.toggle('tier-hidden', hiddenTiers.has(t));
    }
  });

  // Search
  if (q) {
    container.classList.add('search-dim');
    container.querySelectorAll('.member-name').forEach(el => {
      const matches = el.textContent.toLowerCase().includes(q);
      el.classList.toggle('highlight', matches);
      // Expand parents if child matches
      if (matches) {
        let node = el.closest('li');
        while (node) {
          const children = node.querySelector('.children');
          const card = node.querySelector('.member-card');
          if (children && card) { children.classList.add('open'); card.classList.add('open'); }
          node = node.parentElement && node.parentElement.closest('li');
        }
      }
    });
  } else {
    container.classList.remove('search-dim');
    container.querySelectorAll('.member-name').forEach(el => el.classList.remove('highlight'));
  }
}

// Tab switching
document.querySelectorAll('.ac-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.ac-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentView = tab.dataset.view;
    hiddenTiers.clear();
    document.querySelectorAll('.tier-btn').forEach(b => b.classList.remove('dimmed'));
    searchQuery = '';
    document.getElementById('search').value = '';
    renderView();
  });
});

// Expand/collapse all
document.getElementById('expand-all').addEventListener('click', () => {
  document.querySelectorAll('.children').forEach(c => c.classList.add('open'));
  document.querySelectorAll('.member-card.has-children').forEach(c => c.classList.add('open'));
});
document.getElementById('collapse-all').addEventListener('click', () => {
  document.querySelectorAll('.children').forEach(c => c.classList.remove('open'));
  document.querySelectorAll('.member-card.has-children').forEach(c => c.classList.remove('open'));
  // Re-open root level
  document.querySelectorAll('.tree > li > ul.children').forEach(c => {
    c.classList.add('open');
    const card = c.previousElementSibling;
    if (card) card.classList.add('open');
  });
});

// Tier filter
document.querySelectorAll('.tier-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const t = +btn.dataset.tier;
    if (hiddenTiers.has(t)) { hiddenTiers.delete(t); btn.classList.remove('dimmed'); }
    else { hiddenTiers.add(t); btn.classList.add('dimmed'); }
    applyFilters();
  });
});

// Search
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  applyFilters();
});

// Initialize combined editor state once
initCombinedState();
// Update tab counts from live data
document.querySelector('[data-view="r3vrs"]').textContent = `R3VRS · ${RAW.r3vrs.length}`;
document.querySelector('[data-view="kboom"]').textContent = `KB00M · ${RAW.kboom.length}`;

// Initial render
renderView();
// Open root level by default
setTimeout(() => {
  document.querySelectorAll('.tree > li > .member-card.has-children').forEach(c => {
    c.classList.add('open');
    const children = c.nextElementSibling;
    if (children) children.classList.add('open');
  });
}, 0);
</script>
</body>
</html>
